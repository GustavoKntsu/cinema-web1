<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessões</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/main-styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">APOLLO<span>CINE</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                style="color:var(--gold)"><span style="font-size:1.4rem">☰</span></button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-1">
                    <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-filmes.html">Filmes</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-salas.html">Salas</a></li>
                    <li class="nav-item"><a class="nav-link" href="cadastro-sessoes.html">Sessões</a></li>
                    <li class="nav-item"><a class="nav-link" href="venda-ingressos.html">Ingressos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="sessoes.html">Programação</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="page-header">
        <div class="container">
            <p class="page-eyebrow">🎥 Em Cartaz</p>
            <h1 class="page-title">SESSÕES <span>DISPONÍVEIS</span></h1>
        </div>
    </div>

    <div class="container pb-5">
        <div
            class="bg-dark border border-secondary rounded p-3 mb-4 d-flex flex-wrap align-items-center gap-3 shadow-sm">
            <span class="text-warning text-uppercase small fw-bold" style="letter-spacing: 1px;">⚙️ Filtros:</span>

            <select class="form-select form-select-sm bg-dark text-light border-secondary w-auto" id="filtroFilme"
                onchange="renderSessoes()">
                <option value="">Todos os filmes</option>
            </select>

            <select class="form-select form-select-sm bg-dark text-light border-secondary w-auto" id="filtroIdioma"
                onchange="renderSessoes()">
                <option value="">Idioma</option>
                <option value="Dublado">Dublado</option>
                <option value="Legendado">Legendado</option>
            </select>

            <select class="form-select form-select-sm bg-dark text-light border-secondary w-auto" id="filtroFormato"
                onchange="renderSessoes()">
                <option value="">Formato</option>
                <option value="2D">2D</option>
                <option value="3D">3D</option>
            </select>

            <span class="ms-auto text-muted small" id="countSessoes">0 sessões</span>
        </div>

        <div class="row g-3" id="gridSessoes"></div>
    </div>

    <footer>
        <p>CineControl &copy; 2026 — Sistema Web de Controle de Cinema</p>
    </footer>

    <script src="./js/popper.min.js"></script>
    <script src="./js/bootstrap.min.js"></script>
    <script src="./js/programacao.js"></script>
</body>

</html>
